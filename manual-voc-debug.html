<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>manual-voc 디버그</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --card: #fffdf7;
      --line: #1f1f1f;
      --shadow: 0 8px 0 rgba(31, 31, 31, 0.9);
      --accent: #f2c94c;
      --accent-2: #9fe3d3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: #111;
      padding: 24px;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }
    .title {
      font-size: 34px;
      font-weight: 900;
      margin: 0 0 12px;
      letter-spacing: -0.03em;
    }
    .subtitle {
      margin: 0 0 18px;
      color: #444;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .card {
      background: var(--card);
      border: 3px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    label {
      font-size: 14px;
      font-weight: 800;
    }
    input, textarea {
      border: 3px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      background: #fff;
      color: #111;
      outline: none;
    }
    textarea { min-height: 120px; resize: vertical; }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 3px solid var(--line);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      background: #fff;
      box-shadow: 0 5px 0 rgba(31, 31, 31, 0.9);
      cursor: pointer;
      color: #111;
    }
    .primary { background: var(--accent); }
    .secondary { background: var(--accent-2); }
    .mini { background: #fff; }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: #eef7f1;
      font-weight: 800;
      margin-left: 8px;
    }
    .mono {
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.6 Consolas, "Courier New", monospace;
      background: #fff;
      border: 3px dashed #bbb;
      border-radius: 18px;
      padding: 16px;
      min-height: 220px;
    }
    .big {
      font-size: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .hint {
      color: #555;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 10px;
    }
    .top {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .full {
      grid-column: 1 / -1;
    }
    .products {
      max-height: 260px;
      overflow: auto;
      border: 3px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: #fff;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .product {
      text-align: left;
      width: 100%;
    }
    .active {
      background: #fff1a6;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .products { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">manual-voc 디버그</div>
    <p class="subtitle">이 화면은 <b>선택 상품</b>, <b>실제 전송 문장</b>, <b>백엔드 raw 응답</b>만 확인하는 전용 페이지입니다. 답이 안 나올 때 어디서 끊기는지 바로 보려는 목적이에요.</p>

    <div class="grid">
      <section class="card">
        <h2>입력</h2>
        <div class="field">
          <label for="endpoint">Endpoint URL</label>
          <input id="endpoint" value="https://peznvgzngvguvlgnetsp.functions.supabase.co/manual-voc-flow">
        </div>
        <div class="field">
          <label for="apikey">Supabase Key</label>
          <input id="apikey" type="password" placeholder="anon or publishable key">
        </div>
        <div class="field">
          <label for="productSearch">상품 검색</label>
          <input id="productSearch" placeholder="예: 실손, 변액연금, 간편보험">
        </div>
        <div class="field">
          <label for="productInput">선택 상품</label>
          <input id="productInput" placeholder="직접 입력 가능">
        </div>
        <div class="field">
          <label for="question">문의내용</label>
          <textarea id="question" placeholder="예: 보험료 상승 사유"></textarea>
        </div>
        <div class="row">
          <button class="primary" id="runBtn" type="button">답변 생성</button>
          <button class="secondary" id="clearBtn" type="button">초기화</button>
          <button class="mini" id="presetBtn" type="button">실손 예시 채우기</button>
        </div>
        <div class="hint">추천 흐름: 상품을 고르고, 질문을 넣고, 오른쪽 결과에서 실제 전송 문장과 응답을 확인하세요.</div>
        <div style="margin-top:14px">
          <span>선택 상품</span><span class="pill" id="selectedProduct">미선택</span>
        </div>
      </section>

      <section class="card">
        <h2>상품 목록</h2>
        <div class="products" id="products"></div>
      </section>

      <section class="card full">
        <h2>전송 정보</h2>
        <div class="big" id="summary">아직 실행 전입니다.</div>
      </section>

      <section class="card full">
        <h2>백엔드 응답</h2>
        <div class="big" id="answer">아직 실행 전입니다.</div>
      </section>

      <section class="card full">
        <h2>Raw JSON</h2>
        <div class="mono" id="raw">아직 실행 전입니다.</div>
      </section>
    </div>
  </div>

  <script>
    const ENDPOINT = 'https://peznvgzngvguvlgnetsp.functions.supabase.co/manual-voc-flow';
    const STORAGE_KEY = 'manual-voc-debug-key';
    const PRODUCTS = [
      '실손보험', '건강보험', '암보험', '정기보험', '종신보험', '간편보험', '유병자보험',
      '변액저축보험', '변액유니버설', '변액연금', '연금저축', '일반연금', '즉시연금', '종합보험',
      '어린이보험', '치아보험', '치매보험', '간병보험', '재해보험', '상해보험', '운전자보험',
      '저축보험', 'CI보험', '교육보험', '소득보장보험', '여성보험', '갱신형건강보험', '공시이율종신보험',
      '종신연금보험', '간편보험',
    ];

    const el = {
      endpoint: document.getElementById('endpoint'),
      apikey: document.getElementById('apikey'),
      productSearch: document.getElementById('productSearch'),
      productInput: document.getElementById('productInput'),
      question: document.getElementById('question'),
      selectedProduct: document.getElementById('selectedProduct'),
      products: document.getElementById('products'),
      summary: document.getElementById('summary'),
      answer: document.getElementById('answer'),
      raw: document.getElementById('raw'),
      runBtn: document.getElementById('runBtn'),
      clearBtn: document.getElementById('clearBtn'),
      presetBtn: document.getElementById('presetBtn'),
    };

    const productAliases = {
      실손: '실손보험',
      연금: '변액연금',
      종신: '종신보험',
      암: '암보험',
      간편: '간편보험',
      유병자: '유병자보험',
      변액저축: '변액저축보험',
      변액유니버설: '변액유니버설',
      간병: '간병보험',
    };

    function normalize(v) {
      return String(v || '').toLowerCase().replace(/\s+/g, '').replace(/[^0-9a-z가-힣]/g, '');
    }

    function renderProducts() {
      const q = normalize(el.productSearch.value);
      const filtered = PRODUCTS.filter((p) => normalize(p).includes(q));
      el.products.innerHTML = filtered.length
        ? filtered.map((p) => `<button class="product ${p === el.productInput.value ? 'active' : ''}" data-p="${p}">${p}</button>`).join('')
        : '<div style="color:#666;font-size:14px;">검색 결과가 없습니다.</div>';
      el.products.querySelectorAll('button[data-p]').forEach((btn) => {
        btn.addEventListener('click', () => {
          el.productInput.value = btn.dataset.p || '';
          el.selectedProduct.textContent = el.productInput.value || '미선택';
          renderProducts();
        });
      });
    }

    function getEffectiveProduct() {
      const explicit = el.productInput.value.trim();
      if (explicit) return explicit;
      const q = normalize(el.question.value);
      if (q.includes('보험료') && (q.includes('오르') || q.includes('올라') || q.includes('상승'))) return '실손보험';
      if (q.includes('보장내용') || (q.includes('보장') && q.includes('확인'))) return '암보험';
      if (q.includes('가입금액') && q.includes('변경')) return '정기보험';
      if (q.includes('적립금')) return '변액저축보험';
      if (q.includes('간편심사')) return '간편보험';
      if (q.includes('펀드')) return '변액유니버설';
      if (q.includes('연금')) return '변액연금';
      return '';
    }

    function buildText() {
      const product = getEffectiveProduct();
      const question = el.question.value.trim();
      return [product, question].filter(Boolean).join(' ').trim();
    }

    async function run() {
      const apikey = el.apikey.value.trim() || localStorage.getItem(STORAGE_KEY) || '';
      const text = buildText();
      el.selectedProduct.textContent = el.productInput.value.trim() || getEffectiveProduct() || '미선택';
      if (!apikey) {
        el.answer.textContent = 'Supabase Key를 입력해 주세요.';
        return;
      }
      if (!text) {
        el.answer.textContent = '상품종류와 문의내용을 입력해 주세요.';
        return;
      }

      const request = {
        text,
        selected_product: el.productInput.value.trim(),
        effective_product: getEffectiveProduct(),
      };
      el.summary.textContent = JSON.stringify(request, null, 2);
      el.answer.textContent = '실행 중...';
      el.raw.textContent = '실행 중...';

      try {
        const res = await fetch(el.endpoint.value.trim() || ENDPOINT, {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            authorization: `Bearer ${apikey}`,
            apikey,
          },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        el.answer.textContent = data?.draft?.draft_answer
          || data?.search?.matched_rows?.[0]?.standard_answer
          || data?.router?.response
          || data?.search?.reason
          || '표시할 답변이 없습니다.';
        el.raw.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        el.answer.textContent = `오류: ${error.message}`;
        el.raw.textContent = `오류: ${error.message}`;
      }
    }

    el.apikey.value = localStorage.getItem(STORAGE_KEY) || '';
    el.apikey.addEventListener('input', () => localStorage.setItem(STORAGE_KEY, el.apikey.value));
    el.productSearch.addEventListener('input', renderProducts);
    el.question.addEventListener('input', () => {
      el.selectedProduct.textContent = el.productInput.value.trim() || getEffectiveProduct() || '미선택';
      el.summary.textContent = JSON.stringify({
        text: buildText(),
        selected_product: el.productInput.value.trim(),
        effective_product: getEffectiveProduct(),
      }, null, 2);
    });
    el.productInput.addEventListener('input', () => {
      el.selectedProduct.textContent = el.productInput.value.trim() || getEffectiveProduct() || '미선택';
      renderProducts();
    });
    el.runBtn.addEventListener('click', run);
    el.clearBtn.addEventListener('click', () => {
      el.productSearch.value = '';
      el.productInput.value = '';
      el.question.value = '';
      el.selectedProduct.textContent = '미선택';
      el.summary.textContent = '아직 실행 전입니다.';
      el.answer.textContent = '아직 실행 전입니다.';
      el.raw.textContent = '아직 실행 전입니다.';
      renderProducts();
    });
    el.presetBtn.addEventListener('click', () => {
      el.productSearch.value = '실손';
      el.productInput.value = '실손보험';
      el.question.value = '보험료 상승 사유';
      el.selectedProduct.textContent = '실손보험';
      renderProducts();
      el.summary.textContent = JSON.stringify({
        text: buildText(),
        selected_product: el.productInput.value.trim(),
        effective_product: getEffectiveProduct(),
      }, null, 2);
    });

    renderProducts();
  </script>
</body>
</html>
