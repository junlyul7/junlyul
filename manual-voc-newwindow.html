<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>manual-voc 새 창 실행기</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --card: #fffdf7;
      --line: #1f1f1f;
      --accent: #f2c94c;
      --accent-2: #9fe3d3;
      --shadow: 0 8px 0 rgba(31, 31, 31, 0.9);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: #111;
      min-height: 100vh;
      padding: 32px;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }
    .panel {
      background: var(--card);
      border: 3px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 38px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0 0 14px;
      font-size: 16px;
      line-height: 1.7;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button, a {
      appearance: none;
      border: 3px solid var(--line);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      text-decoration: none;
      color: #111;
      background: #fff;
      box-shadow: 0 5px 0 rgba(31, 31, 31, 0.9);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary { background: var(--accent); }
    .secondary { background: var(--accent-2); }
    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #555;
    }
    .box {
      margin-top: 18px;
      border: 3px solid var(--line);
      border-radius: 20px;
      min-height: 68vh;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #fff;
    }
    iframe {
      display: block;
      width: 100%;
      height: 68vh;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>새 창 실행기</h1>
      <p>이 페이지는 `manual-voc-tester.html`을 새 창으로 열어, 캐시 영향 없이 바로 다시 테스트할 수 있게 해줍니다.</p>
      <div class="row">
        <button class="primary" id="openBtn" type="button">테스터 새 창으로 열기</button>
        <button class="secondary" id="reloadBtn" type="button">아래 미리보기 새로고침</button>
        <a href="./manual-voc-tester.html?ts=1" target="_blank" rel="noreferrer">직접 새 탭 열기</a>
      </div>
      <div class="note">새 창은 항상 `manual-voc-tester.html?ts=날짜` 형태로 열어서 이전 상태를 최대한 피합니다.</div>
    </section>

    <section class="box" aria-label="preview">
      <iframe id="frame" src="./manual-voc-tester.html?ts=1" title="manual-voc tester preview"></iframe>
    </section>
  </div>

  <script>
    const frame = document.getElementById('frame');
    const ts = () => Date.now();

    document.getElementById('openBtn').addEventListener('click', () => {
      window.open(`./manual-voc-tester.html?ts=${ts()}`, '_blank', 'noopener,noreferrer');
    });

    document.getElementById('reloadBtn').addEventListener('click', () => {
      frame.src = `./manual-voc-tester.html?ts=${ts()}`;
    });
  </script>
</body>
</html>
