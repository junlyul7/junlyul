<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>manual-voc-tester 실행기</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --card: #fffdf7;
      --line: #1f1f1f;
      --accent: #f2c94c;
      --accent-2: #9fe3d3;
      --shadow: 0 8px 0 rgba(31, 31, 31, 0.9);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: #111;
      min-height: 100vh;
      padding: 32px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    .hero {
      background: var(--card);
      border: 3px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0 0 14px;
      font-size: 16px;
      line-height: 1.7;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    a, button {
      appearance: none;
      border: 3px solid var(--line);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      text-decoration: none;
      color: #111;
      background: #fff;
      box-shadow: 0 5px 0 rgba(31, 31, 31, 0.9);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary { background: var(--accent); }
    .secondary { background: var(--accent-2); }
    .viewer {
      margin-top: 18px;
      border: 3px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
      min-height: 76vh;
      box-shadow: var(--shadow);
    }
    iframe {
      width: 100%;
      height: 76vh;
      border: 0;
      display: block;
      background: #fff;
    }
    .meta {
      margin-top: 14px;
      font-size: 13px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>manual-voc-tester 실행기</h1>
      <p>아래 버튼으로 테스트 화면을 열거나, 바로 아래 미리보기에서 `manual-voc-tester.html`을 확인할 수 있습니다.</p>
      <div class="actions">
        <a class="primary" href="./manual-voc-tester.html" target="_blank" rel="noreferrer">테스터 새 창으로 열기</a>
        <button class="secondary" id="reloadBtn" type="button">미리보기 새로고침</button>
      </div>
      <div class="meta">같은 폴더에 있는 `manual-voc-tester.html`을 기준으로 동작합니다.</div>
    </section>

    <section class="viewer" aria-label="tester preview">
      <iframe id="frame" src="./manual-voc-tester.html" title="manual-voc-tester preview"></iframe>
    </section>
  </div>

  <script>
    const frame = document.getElementById('frame');
    document.getElementById('reloadBtn').addEventListener('click', () => {
      frame.src = './manual-voc-tester.html?reload=' + Date.now();
    });
  </script>
</body>
</html>
